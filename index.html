<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Multimedia Workflow Builder — PDMR Studios</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#161618;--bg3:#1e1e22;--bg4:#26262c;
  --border:#252528;--border2:#35353c;--border3:#454550;
  --text:#f0f0f2;--text2:#98989f;--text3:#52525c;--text4:#3a3a42;
  --accent:#7C3AED;--accent2:#9F77EE;--accent3:#2d1a5e;
  --green:#5cb85c;--green2:#1e3a1e;--amber:#d4941a;--red:#c0392b;
  --v1:#7C3AED;--v2:#D85A30;--v3:#378ADD;
  --radius:12px;--rsm:8px;--rxs:5px;
  --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit;background:none;border:none;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

.shell{display:grid;grid-template-columns:220px 1fr;height:100vh;overflow:hidden}

/* RAIL */
.rail{background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.brand{padding:15px 14px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:9px}
.brand-mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.brand-txt b{font-size:13px;font-weight:600;display:block;letter-spacing:-0.2px}
.brand-txt span{font-size:10px;color:var(--text3)}
.rail-hd{padding:12px 12px 4px;display:flex;align-items:center;justify-content:space-between}
.rail-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.icon-btn{width:22px;height:22px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:.13s}
.icon-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.proj-list{flex:1;overflow-y:auto;padding:4px 8px 8px}
.proj-item{padding:8px 9px;border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;transition:.12s;border:0.5px solid transparent}
.proj-item:hover{background:var(--bg3)}
.proj-item.active{background:var(--bg3);border-color:var(--border2)}
.proj-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.proj-nm{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-badge{font-size:10px;color:var(--text3);font-family:var(--mono)}
.drag-handle{font-size:13px;color:var(--text4);cursor:grab;flex-shrink:0;line-height:1;padding-right:2px;transition:color .13s}
.proj-item:hover .drag-handle{color:var(--text3)}
.proj-item[draggable="true"]{cursor:pointer}
.proj-item.drag-over{border-color:var(--accent)!important;background:var(--accent3)!important}
.proj-item.dragging{opacity:.4;cursor:grabbing}
.rail-foot{padding:10px 12px;border-top:0.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:7px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}

/* STAGE */
.stage{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{padding:13px 22px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:600;letter-spacing:-0.3px;flex:1}
.topbar-meta{font-size:11px;color:var(--text3)}
.sync-btn{font-size:11px;font-weight:500;padding:6px 11px;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;gap:6px;transition:.13s}
.sync-btn:hover{border-color:var(--accent);color:var(--accent2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* NAV */
.nav-bar{flex-shrink:0;border-bottom:0.5px solid var(--border);background:var(--bg2)}
.season-row{display:flex;align-items:center;gap:4px;padding:10px 22px 0;overflow-x:auto}
.season-tab{padding:7px 12px;font-size:12px;font-weight:500;color:var(--text3);border:0.5px solid transparent;border-bottom:none;border-radius:var(--rsm) var(--rsm) 0 0;cursor:pointer;background:none;transition:.12s;flex-shrink:0;white-space:nowrap}
.season-tab:hover{color:var(--text2)}
.season-tab.active{color:var(--text);background:var(--bg);border-color:var(--border);margin-bottom:-0.5px;z-index:1;position:relative}
.season-add{font-size:16px;color:var(--text4);padding:4px 8px;transition:.12s}
.season-add:hover{color:var(--accent)}
.ep-row{display:flex;align-items:center;gap:6px;padding:9px 22px;overflow-x:auto}
.ep-pill{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.12s;white-space:nowrap}
.ep-pill:hover{border-color:var(--border3);color:var(--text)}
.ep-pill.active{color:#fff}
.ep-add{width:26px;height:26px;border-radius:50%;border:0.5px dashed var(--border2);color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;transition:.13s;flex-shrink:0}
.ep-add:hover{border-color:var(--accent);color:var(--accent);border-style:solid}
.done-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse-dot 2s ease-in-out infinite;box-shadow:0 0 0 0 rgba(92,184,92,.6)}
@keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(92,184,92,.6)}70%{box-shadow:0 0 0 5px rgba(92,184,92,0)}100%{box-shadow:0 0 0 0 rgba(92,184,92,0)}}

/* WF TABS */
.wf-tabs-row{display:flex;align-items:center;border-bottom:0.5px solid var(--border);flex-shrink:0;padding:0 22px}
.wf-tab{padding:11px 3px;margin-right:16px;font-size:12px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.12s;white-space:nowrap}
.wf-tab:hover{color:var(--text2)}
.wf-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.wf-prog-badge{font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:10px;background:var(--bg3);color:var(--text3)}
.wf-tab.active .wf-prog-badge{background:var(--accent3);color:var(--accent2)}
.wf-tab-add{font-size:17px;color:var(--text4);padding:4px;transition:.12s;margin-left:auto}
.wf-tab-add:hover{color:var(--accent)}

/* CANVAS */
.canvas{flex:1;overflow-y:auto;padding:18px 22px 60px}

/* CYCLE LEGEND */
.cycle-legend{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:11px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm)}
.cycle-legend span{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* STATS + MAJOR HEADER GRID */
.header-strip{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg2)}
.stats-col{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.stat-card{padding:12px 15px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.stat-card:nth-child(2){border-right:none}
.stat-card:nth-child(3){border-bottom:none;border-right:0.5px solid var(--border)}
.stat-card:nth-child(4){border-right:none;border-bottom:none}
.stat-v{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1.1}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-top:4px}
.stat-bar{height:2px;background:var(--bg4);border-radius:2px;margin-top:9px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.major-col{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;border-left:0.5px solid var(--border)}
.major-pill{padding:12px 15px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .13s;display:flex;flex-direction:column;user-select:none}
.major-pill:nth-child(2){border-right:none}
.major-pill:nth-child(3){border-bottom:none}
.major-pill:nth-child(4){border-right:none;border-bottom:none}
.major-pill:hover{background:var(--bg3)}
.major-pill-ct{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-1px;line-height:1.1}
.major-pill-lab{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
.major-pill-bar{height:2px;border-radius:2px;margin-top:9px;overflow:hidden;background:var(--bg4)}
.major-pill-fill{height:100%;border-radius:2px;transition:width .4s}
.mp-not-started:hover,.mp-not-started.mp-active{background:#131315}
.mp-not-started .major-pill-ct{color:var(--text2)}
.mp-not-started .major-pill-lab{color:var(--text3)}
.mp-filming:hover,.mp-filming.mp-active{background:#1e1108}
.mp-filming .major-pill-ct{color:#d4941a}
.mp-filming .major-pill-lab{color:#d4941a}
.mp-editing:hover,.mp-editing.mp-active{background:#13102a}
.mp-editing .major-pill-ct{color:var(--accent2)}
.mp-editing .major-pill-lab{color:var(--accent2)}
.mp-finished:hover,.mp-finished.mp-active{background:#0e1e0e}
.mp-finished .major-pill-ct{color:var(--green)}
.mp-finished .major-pill-lab{color:var(--green)}
.major-section{margin-bottom:16px}
.major-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);cursor:pointer;user-select:none;border:0.5px solid var(--border);margin-bottom:8px;transition:border-color .13s}
.major-hd:hover{border-color:var(--border2)}
.major-hd.ms-not-started{background:#131315}
.major-hd.ms-filming{background:#1e1108}
.major-hd.ms-editing{background:#13102a}
.major-hd.ms-finished{background:#0e1e0e}
.major-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.major-icon.ms-not-started{background:#1e1e22;color:var(--text3)}
.major-icon.ms-filming{background:#3a1a0a;color:#d4741a}
.major-icon.ms-editing{background:var(--accent3);color:var(--accent2)}
.major-icon.ms-finished{background:var(--green2);color:var(--green)}
.major-lbl{font-size:13px;font-weight:600;flex:1}
.major-lbl.ms-not-started{color:var(--text2)}
.major-lbl.ms-filming{color:#d4741a}
.major-lbl.ms-editing{color:var(--accent2)}
.major-lbl.ms-finished{color:var(--green)}
.major-ct{font-size:11px;font-family:var(--mono);color:var(--text3)}
.major-bar{height:3px;background:var(--bg4);border-radius:2px;width:70px;overflow:hidden}
.major-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.major-chev{font-size:10px;color:var(--text3);transition:transform .18s}
.major-section.collapsed .major-chev{transform:rotate(-90deg)}
.major-body{display:flex;flex-direction:column;gap:6px;padding-left:4px}
.major-section.collapsed .major-body{display:none}
.major-empty{padding:10px 12px;font-size:12px;color:var(--text3);border:0.5px dashed var(--border);border-radius:var(--rsm);text-align:center}

/* TASK GROUP (cycle sub-groups within a major section) */
.cycle-group{margin-bottom:4px}
.cycle-group-hd{display:flex;align-items:center;gap:8px;padding:6px 0 4px;cursor:pointer;user-select:none}
.cycle-group-hd:hover .cycle-group-lbl{color:var(--text2)}
.cycle-group-bar{flex:1;height:0.5px;background:var(--border)}
.cycle-group-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap;transition:.12s}
.cycle-group-ct{font-size:10px;font-family:var(--mono);color:var(--text4);background:var(--bg3);padding:1px 7px;border-radius:10px}
.cycle-group-chev{font-size:10px;color:var(--text4);transition:transform .18s}
.cycle-group.collapsed .cycle-group-chev{transform:rotate(-90deg)}
.cycle-group-body{display:flex;flex-direction:column;gap:5px}
.cycle-group.collapsed .cycle-group-body{display:none}

/* STEP CARD */
.step{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .13s}
.step:hover:not(.expanded){border-color:var(--border2)}
.step.expanded{border-color:var(--border3)}
.step-hd{display:flex;align-items:center;gap:10px;padding:10px 13px;user-select:none}
.step-circle{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s,filter .15s;position:relative}
.step-circle:hover{transform:scale(1.15);filter:brightness(1.3)}
.step-circle:active{transform:scale(.92)}
.step-circle-done circle:last-child{stroke:#5cb85c!important}
.step-ring{flex-shrink:0}
.step-center{flex:1;min-width:0}
.step-title{font-size:13px;font-weight:500;line-height:1.3;display:flex;align-items:center;gap:7px}
.step.status-finished .step-title-txt{text-decoration:line-through;color:var(--text3)}
.ver-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em;flex-shrink:0}
.ver-v1{background:#2d1a5e;color:#9F77EE}
.ver-v2{background:#3a1a0a;color:#d4741a}
.ver-v3{background:#0f2040;color:#6ba3d6}
.step-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:10px;font-family:var(--mono)}
.step-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-not-started{background:#1e1e22;color:var(--text3)}
.badge-filming{background:#3a1a0a;color:#d4741a}
.badge-editing{background:var(--accent3);color:var(--accent2)}
.badge-finished{background:var(--green2);color:var(--green)}
.chev{font-size:10px;color:var(--text3);transition:transform .18s}
.step.expanded .chev{transform:rotate(90deg)}

/* STEP BODY */
.step-body{border-top:0.5px solid var(--border);animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.step-inner{padding:13px}
.field-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.desc-field{width:100%;font-size:13px;color:var(--text2);background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rsm);padding:8px 11px;line-height:1.5;resize:none;min-height:34px;transition:.13s}
.desc-field:focus{border-color:var(--accent);color:var(--text)}

/* SUBTASKS */
.subs-wrap{display:flex;flex-direction:column;gap:1px}
.sub-row{display:flex;align-items:flex-start;gap:8px;padding:5px 7px;border-radius:var(--rxs);transition:background .1s}
.sub-row:hover{background:var(--bg3)}
.chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border3);flex-shrink:0;margin-top:1px;cursor:pointer;appearance:none;-webkit-appearance:none;background:var(--bg);transition:.13s;display:flex;align-items:center;justify-content:center;position:relative}
.chk:checked{background:var(--green);border-color:var(--green)}
.chk:checked::after{content:"✓";font-size:9px;color:#0d0d0f;font-weight:900;position:absolute}
.chk:hover:not(:checked){border-color:var(--border2)}
.sub-txt-wrap{flex:1;min-width:0}
.sub-txt{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word;cursor:text}
.sub-txt.done{text-decoration:line-through;color:var(--text3)}
.sub-del{opacity:0;font-size:11px;color:var(--text3);padding:1px 4px;border-radius:3px;transition:.12s;flex-shrink:0}
.sub-row:hover .sub-del{opacity:1}
.sub-del:hover{color:var(--red)}
.kids-wrap{margin-left:23px;padding-left:7px;border-left:1.5px solid var(--border);margin-top:1px;display:flex;flex-direction:column;gap:1px}
.kid-add-row{margin-left:23px;margin-top:3px;display:flex;align-items:center;gap:5px}
.kid-add-input{font-size:12px;background:none;border-bottom:0.5px solid var(--border2);padding:2px 4px;flex:1;color:var(--text2);transition:.12s}
.kid-add-input:focus{border-color:var(--accent)}
.kid-add-input::placeholder{color:var(--text4)}
.mini-btn{font-size:11px;color:var(--text3);padding:2px 6px;border-radius:4px;transition:.12s}
.mini-btn:hover{color:var(--accent2);background:var(--bg3)}
.add-row{display:flex;gap:7px;margin-top:6px}
.add-input{flex:1;font-size:12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rsm);padding:6px 10px;color:var(--text);transition:.13s}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:var(--text3)}
.add-go{font-size:11px;font-weight:600;background:var(--accent);border-radius:var(--rsm);padding:6px 11px;color:#fff;transition:.13s}
.add-go:hover{background:var(--accent2)}
.script-field{width:100%;font-size:12px;color:var(--text2);background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rsm);padding:9px 11px;line-height:1.65;resize:vertical;min-height:60px;font-family:var(--mono);transition:.13s}
.script-field:focus{border-color:var(--accent);color:var(--text)}

/* STEP FOOTER */
.step-ft{display:flex;align-items:center;gap:7px;padding-top:10px;border-top:0.5px solid var(--border);margin-top:4px;flex-wrap:wrap}
.seg-group{display:flex;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rsm);overflow:hidden}
.seg-btn{font-size:10px;font-weight:500;padding:5px 8px;border-right:0.5px solid var(--border);color:var(--text3);transition:.12s}
.seg-btn:last-child{border-right:none}
.seg-btn:hover{color:var(--text2)}
.seg-btn.on{font-weight:700}
.seg-btn.on.s-ns{background:var(--bg3);color:var(--text2)}
.seg-btn.on.s-fi{background:#3a1a0a;color:#d4741a}
.seg-btn.on.s-ed{background:var(--accent3);color:var(--accent2)}
.seg-btn.on.s-fn{background:var(--green2);color:var(--green)}
.mv-btn{width:24px;height:24px;border-radius:5px;border:0.5px solid var(--border);background:var(--bg);color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center;transition:.12s}
.mv-btn:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.mv-btn:disabled{opacity:.2;cursor:not-allowed}
.del-btn{font-size:10px;padding:5px 9px;border-radius:var(--rsm);border:0.5px solid var(--border);color:var(--text3);margin-left:auto;transition:.12s}
.del-btn:hover{border-color:var(--red);color:var(--red)}

/* NEW STEP */
.new-step-row{display:flex;gap:8px;margin-top:6px}
.new-step-input{flex:1;font-size:13px;background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--rsm);padding:10px 13px;color:var(--text);transition:.13s}
.new-step-input:focus{border-color:var(--accent);border-style:solid;background:var(--bg)}
.new-step-input::placeholder{color:var(--text3)}
.new-step-btn{font-size:12px;font-weight:600;background:var(--accent);border-radius:var(--rsm);padding:0 14px;color:#fff;transition:.13s}
.new-step-btn:hover{background:var(--accent2)}

.sec-div{margin:12px 0 8px;display:flex;gap:8px;align-items:center}
.sec-div-line{flex:1;height:0.5px;background:var(--border)}
.sec-div-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:3rem;text-align:center}

/* ── TALKING TO: cycle-based season builder ── */
function mkTTWorkflowsForCycle(ep1,ep2,ep3){
  function cs(task,s1,s2,s3){
    // snake: s1→s2→s3 forward or s3→s2→s1 reverse based on task index
    return[
      mkStep(s1+" "+task,"v1"),mkStep(s2+" "+task,"v2"),mkStep(s3+" "+task,"v3"),
    ];
  }
  function csR(task,s1,s2,s3){
    return[
      mkStep(s3+" "+task,"v3"),mkStep(s2+" "+task,"v2"),mkStep(s1+" "+task,"v1"),
    ];
  }
  const n1=ep1,n2=ep2,n3=ep3;
  return[
    {id:nid(),name:"Video",isCycle:true,steps:[
      ...cs("Lighting",n1,n2,n3),
      ...csR("Color",n1,n2,n3),
      ...cs("Blackout",n1,n2,n3),
      ...csR("Cut 1",n1,n2,n3),
      ...cs("Text",n1,n2,n3),
      ...csR("Cut 2",n1,n2,n3),
    ]},
    {id:nid(),name:"Audio",isCycle:true,steps:[
      ...cs("Clean Up",n1,n2,n3),
      ...csR("Censorship",n1,n2,n3),
      ...cs("Balancing",n1,n2,n3),
      ...csR("Music",n1,n2,n3),
    ]},
    {id:nid(),name:"Media",isCycle:true,steps:[
      ...cs("Highlight Gathering",n1,n2,n3),
      ...csR("Transcription",n1,n2,n3),
      ...cs("Intro",n1,n2,n3),
      ...csR("Thumbnail Design",n1,n2,n3),
    ]},
    {id:nid(),name:"Copy",isCycle:true,steps:[
      ...cs("Title",n1,n2,n3),
      ...csR("Description",n1,n2,n3),
      ...cs("Timestamps",n1,n2,n3),
      ...csR("Tags",n1,n2,n3),
      ...cs("Post",n1,n2,n3),
    ]},
  ];
}

function mkCycle(num,ep1,ep2,ep3){
  const label=`Cycle ${num}: ${ep1} · ${ep2} · ${ep3}`;
  return{id:nid(),label,num,subjects:[ep1,ep2,ep3],workflows:mkTTWorkflowsForCycle(ep1,ep2,ep3)};
}

function mkTTSeason(label,epNames){
  // group episodes into cycles of 3; pad last cycle if needed
  const cycles=[];
  for(let i=0;i<Math.max(epNames.length,1);i+=3){
    const num=Math.floor(i/3)+1;
    const s1=epNames[i]||`Ep ${i+1}`;
    const s2=epNames[i+1]||`Ep ${i+2}`;
    const s3=epNames[i+2]||`Ep ${i+3}`;
    // only make cycle if at least 1 ep exists at this offset
    if(i<epNames.length) cycles.push(mkCycle(num,s1,s2,s3));
  }
  // if no episodes yet, create 4 empty cycles
  if(cycles.length===0){
    for(let i=1;i<=4;i++) cycles.push(mkCycle(i,`Ep ${(i-1)*3+1}`,`Ep ${(i-1)*3+2}`,`Ep ${(i-1)*3+3}`));
  }
  return{id:nid(),label,cycles};
}

/* ── GENERIC 3-subject cycle workflow builder ── */
function mkWorkflowsForCycle(seriesType, s1, s2, s3){
  function cs(task,a,b,c){return[mkStep(a+" "+task,"v1"),mkStep(b+" "+task,"v2"),mkStep(c+" "+task,"v3")];}
  function csR(task,a,b,c){return[mkStep(c+" "+task,"v3"),mkStep(b+" "+task,"v2"),mkStep(a+" "+task,"v1")];}

  if(seriesType==="tt"){
    return[
      {id:nid(),name:"Video",isCycle:true,steps:[...cs("Lighting",s1,s2,s3),...csR("Color",s1,s2,s3),...cs("Blackout",s1,s2,s3),...csR("Cut 1",s1,s2,s3),...cs("Text",s1,s2,s3),...csR("Cut 2",s1,s2,s3)]},

      {id:nid(),name:"Media",isCycle:true,steps:[...cs("Highlight Gathering",s1,s2,s3),...csR("Intro/Outro",s1,s2,s3),...cs("Thumbnail Design",s1,s2,s3)]},
      {id:nid(),name:"Copy",isCycle:true,steps:[...cs("Transcription",s1,s2,s3),...csR("Title",s1,s2,s3),...cs("Description",s1,s2,s3),...csR("Timestamps",s1,s2,s3),...cs("Tags",s1,s2,s3),...csR("Post",s1,s2,s3)]},
    ];

  if(seriesType==="pty"){
    return[
      {id:nid(),name:"Script",isCycle:true,steps:[...cs("General Prompt",s1,s2,s3),...csR("General Research",s1,s2,s3),...cs("Draft",s1,s2,s3),...csR("Script",s1,s2,s3),...cs("Review",s1,s2,s3)]},
      {id:nid(),name:"Recording",isCycle:true,steps:[...cs("Prep",s1,s2,s3),...csR("Record",s1,s2,s3),...cs("Review",s1,s2,s3)]},
      {id:nid(),name:"Video",isCycle:true,steps:[...cs("Lighting",s1,s2,s3),...csR("Color",s1,s2,s3),...cs("Cut 1",s1,s2,s3),...csR("Cut 2",s1,s2,s3)]},
      {id:nid(),name:"Audio",isCycle:true,steps:[...cs("Clean Up",s1,s2,s3),...csR("Censorship",s1,s2,s3),...cs("Balancing",s1,s2,s3),...csR("Music",s1,s2,s3)]},
      {id:nid(),name:"Media",isCycle:true,steps:[...cs("Highlight Gathering",s1,s2,s3),...csR("Media Gathering",s1,s2,s3),...cs("Intro/Outro",s1,s2,s3),...csR("Thumbnail Design",s1,s2,s3)]},
      {id:nid(),name:"Copy",isCycle:true,steps:[...cs("Title",s1,s2,s3),...csR("Description",s1,s2,s3),...cs("Timestamps",s1,s2,s3),...csR("Tags",s1,s2,s3),...cs("Post",s1,s2,s3)]},
    ];
  }
  if(seriesType==="uti"){
    return[
      {id:nid(),name:"Script",isCycle:true,steps:[...cs("General Prompt",s1,s2,s3),...csR("General Research",s1,s2,s3),...cs("Draft",s1,s2,s3),...csR("Script",s1,s2,s3),...cs("Review",s1,s2,s3)]},
      {id:nid(),name:"Recording",isCycle:true,steps:[...cs("Prep",s1,s2,s3),...csR("Record",s1,s2,s3),...cs("Review",s1,s2,s3)]},
      {id:nid(),name:"Video",isCycle:true,steps:[...cs("Lighting",s1,s2,s3),...csR("Color",s1,s2,s3),...cs("Blackout",s1,s2,s3),...csR("Cut 1",s1,s2,s3),...cs("Text",s1,s2,s3),...csR("Cut 2",s1,s2,s3)]},
      {id:nid(),name:"Audio",isCycle:true,steps:[...cs("Clean Up",s1,s2,s3),...csR("Censorship",s1,s2,s3),...cs("Balancing",s1,s2,s3),...csR("Music",s1,s2,s3)]},
      {id:nid(),name:"Media",isCycle:true,steps:[...cs("Highlight Gathering",s1,s2,s3),...csR("Media Gathering",s1,s2,s3),...cs("Intro/Outro",s1,s2,s3),...csR("Thumbnail Design",s1,s2,s3)]},
      {id:nid(),name:"Copy",isCycle:true,steps:[...cs("Title",s1,s2,s3),...csR("Description",s1,s2,s3),...cs("Timestamps",s1,s2,s3),...csR("Tags",s1,s2,s3),...cs("Post",s1,s2,s3)]},
    ];
  }
  if(seriesType==="schiz"){
    return[
      {id:nid(),name:"Script",isCycle:true,steps:[...cs("General Research",s1,s2,s3),...csR("Draft",s1,s2,s3),...cs("Script",s1,s2,s3),...csR("Review",s1,s2,s3)]},
      {id:nid(),name:"Recording",isCycle:true,steps:[...cs("Prep",s1,s2,s3),...csR("Record",s1,s2,s3),...cs("Review",s1,s2,s3)]},
      {id:nid(),name:"Audio",isCycle:true,steps:[...cs("Clean Up",s1,s2,s3),...csR("Balancing",s1,s2,s3),...cs("Music",s1,s2,s3)]},
      {id:nid(),name:"Media",isCycle:true,steps:[...cs("Highlight Gathering",s1,s2,s3),...csR("Media Gathering",s1,s2,s3),...cs("Intro/Outro",s1,s2,s3),...csR("Thumbnail Design",s1,s2,s3)]},
      {id:nid(),name:"Copy",isCycle:true,steps:[...cs("Transcription",s1,s2,s3),...csR("Title",s1,s2,s3),...cs("Description",s1,s2,s3),...csR("Timestamps",s1,s2,s3),...cs("Tags",s1,s2,s3),...csR("Post",s1,s2,s3)]},
    ];
  }
  // generic (One Day As, PDMR Show)
  return[
    {id:nid(),name:"Script",isCycle:true,steps:[...cs("General Prompt",s1,s2,s3),...csR("Subject Prompt",s1,s2,s3),...cs("Subject Research",s1,s2,s3),...csR("General Research",s1,s2,s3),...cs("Road Sheet",s1,s2,s3),...csR("Draft",s1,s2,s3),...cs("Script",s1,s2,s3),...csR("Review",s1,s2,s3)]},
    {id:nid(),name:"Recording",isCycle:true,steps:[...cs("Prep",s1,s2,s3),...csR("Record",s1,s2,s3),...cs("Review",s1,s2,s3)]},
    {id:nid(),name:"Video",isCycle:true,steps:[...cs("Lighting",s1,s2,s3),...csR("Color",s1,s2,s3),...cs("Blackout",s1,s2,s3),...csR("Cut 1",s1,s2,s3),...cs("Text",s1,s2,s3),...csR("Cut 2",s1,s2,s3)]},

function mkCycleFor(seriesType, num, s1, s2, s3){
  return{id:nid(),num,label:`Cycle ${num}: ${s1} · ${s2} · ${s3}`,subjects:[s1,s2,s3],workflows:mkWorkflowsForCycle(seriesType,s1,s2,s3)};
}

function mkSeasonWithCycles(label, epNames, seriesType){
  const cycles=[];
  for(let i=0;i<epNames.length||i===0;i+=3){
    const num=Math.floor(i/3)+1;
    const s1=epNames[i]   ||(seriesType==="tt"?`Interview ${i+1}`:`Ep ${i+1}`);
    const s2=epNames[i+1] ||(seriesType==="tt"?`Interview ${i+2}`:`Ep ${i+2}`);
    const s3=epNames[i+2] ||(seriesType==="tt"?`Interview ${i+3}`:`Ep ${i+3}`);
    if(i<epNames.length) cycles.push(mkCycleFor(seriesType,num,s1,s2,s3));
  }
  if(!cycles.length){
    for(let i=1;i<=4;i++) cycles.push(mkCycleFor(seriesType,i,`Ep ${(i-1)*3+1}`,`Ep ${(i-1)*3+2}`,`Ep ${(i-1)*3+3}`));
  }
  return{id:nid(),label,cycles};
}

}

function load(){

      S=JSON.parse(r);
      if(!S.collapsedGroups)S.collapsedGroups={};
      if(!S.modal)S.modal=null;
      if(!S.modalDraft)S.modalDraft={};
      if(!S.openStep)S.openStep=null;

      // Rebuild all seasons from fresh seed so cycles are always correct
      const freshSeed=JSON.parse(JSON.stringify(SEED));
      S.projects.forEach((p,pi)=>{
        if(!p.seriesType)p.seriesType="generic";
        // always rebuild seasons from seed to pick up cycle structure
        const seedProj=freshSeed.projects.find(sp=>sp.name===p.name);
        if(seedProj) p.seasons=seedProj.seasons;
        (p.seasons||[]).forEach(sn=>{
          // handle both episodes and cycles
          const items=[...(sn.episodes||[]),...(sn.cycles||[])];
          items.forEach(e=>{

                if(!s.subs)s.subs=[];
                if(!s.script)s.script="";
                if(!s.ver)s.ver="";
                if(!s.status)s.status="not-started";
                s.subs.forEach(sub=>{
                  if(!sub.kids)sub.kids=[];
                  if(typeof sub.done==="undefined")sub.done=false;
                });
              });
            });
          });
        });
      });

      // fix active selection — always reset to first cycle of first season
      const ap=S.projects.find(pr=>pr.id===S.activeProject)||S.projects[0];
      if(ap){
        S.activeProject=ap.id;
        const sn=ap.seasons[0];
        if(sn){

          const first=sn.cycles?.[0];
          if(first){S.activeEp=first.id;S.activeWf=first.workflows?.[0]?.id||null;}
        }
      }
      return;
    }
  }catch(e){console.warn("Load failed, starting fresh:",e);}

function ring(pct,sz,sw,color){

  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#26262c" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
}

function epPct(e){
  if(!e)return 0;
  const wfs=e.workflows||[];
  let d=0,t=0;wfs.forEach(w=>(w.steps||[]).forEach(s=>{t++;if(s.status==="finished")d++;}));
  return t?Math.round(d/t*100):0;
}
function subStats(s){let d=0,t=0;(s.subs||[]).forEach(x=>{t++;if(x.done)d++;(x.kids||[]).forEach(k=>{t++;if(k.done)d++;});});return{done:d,total:t};}
function stepRingPct(s){if(s.status==="finished")return 100;if(s.status==="not-started")return 0;const ss=subStats(s);if(ss.total)return Math.round(ss.done/ss.total*100);return s.status==="filming"?30:s.status==="editing"?60:0;}

/* group steps into snake cycles of 3 */
function groupSteps(steps){
  const groups=[];
  const e=ep();
  const subjects=e&&e.subjects?e.subjects:null;
  for(let i=0;i<steps.length;i+=3){
    const chunk=steps.slice(i,i+3);
    let taskName;
    if(subjects&&subjects.length){
      const title=chunk[0].title;
      let stripped=title;
      for(const sub of subjects){
        if(title.startsWith(sub+" ")){stripped=title.slice(sub.length+1).trim();break;}
        if(title.endsWith(" "+sub)){stripped=title.slice(0,title.length-sub.length-1).trim();break;}
      }
      taskName=stripped||title;
    } else {
      taskName=chunk[0].title.replace(/^V[123]\s+/i,"").trim();
    }
    groups.push({taskName,steps:chunk,startIdx:i});
  }
  return groups;
}

function dragDrop(e,i){
  e.preventDefault();
  if(_dragIdx===null||_dragIdx===i)return;
  const arr=S.projects;
  const moved=arr.splice(_dragIdx,1)[0];
  arr.splice(i,0,moved);

        <div class="major-pill mp-editing">
          <div class="major-pill-ct">${all.filter(s=>s.status==="editing").length}</div>
          <div class="major-pill-lab">Editing</div>
          <div class="major-pill-bar"><div class="major-pill-fill" style="width:${all.length?Math.round(all.filter(s=>s.status==="editing").length/all.length*100):0}%;background:#7C3AED"></div></div>
        </div>
        <div class="major-pill mp-finished">
          <div class="major-pill-ct">${fnCount}</div>
          <div class="major-pill-lab">Finished</div>
          <div class="major-pill-bar"><div class="major-pill-fill" style="width:${fnPct}%;background:#5cb85c"></div></div>
        </div>
      </div>
    </div>`;
        canvas=headerStrip+`<div class="canvas">
      ${legend}
      ${majorSections}
      <div class="new-step-row">
        <input class="new-step-input" id="newStepInput" placeholder="Add a step to ${esc(w.name)}…" onkeydown="if(event.key==='Enter')addStep()"/>
        <button class="new-step-btn" onclick="addStep()">＋ Step</button>
      </div>
    </div>`;
  }

  stage.innerHTML=`
    <div class="topbar">
      <span class="topbar-dot" style="background:${p.color}"></span>
      <h1>${esc(p.name)}</h1>
      <span class="topbar-meta">${p.seasons.length} seasons · ${p.seasons.reduce((a,s)=>a+(s.cycles||[]).length,0)} cycles</span>
      <button class="sync-btn" onclick="toast('✓ Read from Notion — no changes made')"><span class="sync-dot"></span>Notion read-only</button>
    </div>
    <div class="nav-bar">
      <div class="season-row">${seasonTabs}</div>
      <div class="ep-row">${epPills}</div>
    </div>
    ${wfTabsHtml}
    ${canvas}`;
}

function renderStep(s,i,total){
  const open=s.id===S.openStep;
  const ss=subStats(s);
  const pct=stepRingPct(s);
  const col=s.ver?verColor(s.ver):stageColor(s.status);
  const verLabel=s.ver?`<span class="ver-tag ver-${s.ver}">${s.ver.toUpperCase()}</span>`:"";
  const isDone=s.status==="finished";
  return`<div class="step ${open?"expanded":""} status-${s.status}">
    <div class="step-hd">
      <button class="step-circle ${isDone?"step-circle-done":""}" onclick="cycleStep(${s.id})" title="Mark complete" style="--col:${col}">
        ${ring(pct,28,2.5,col)}
      </button>
      <div class="step-center" onclick="toggleStep(${s.id})" style="cursor:pointer">
        <div class="step-title">${verLabel}<span class="step-title-txt">${esc(s.title)}</span></div>
        <div class="step-meta">
          ${ss.total?`<span>☑ ${ss.done}/${ss.total}</span>`:`<span style="color:var(--text4)">no substeps</span>`}
          ${(s.script||"").trim()?`<span>📝</span>`:""}
        </div>
      </div>
      <div class="step-right" onclick="toggleStep(${s.id})" style="cursor:pointer"><span class="chev">▶</span></div>
    </div>
    ${open?renderStepBody(s,i,total):""}
  </div>`;
}

function renderStepBody(s,i,total){
  const subs=s.subs||[];
  return`<div class="step-body"><div class="step-inner" onclick="event.stopPropagation()">
    <div class="subs-wrap">${subs.length?subs.map(sub=>renderSub(s.id,sub)).join(""):`<div style="font-size:12px;color:var(--text3);padding:2px 0 6px">No substeps yet.</div>`}</div>
    <div class="add-row">
      <input class="add-input" id="sub-${s.id}" placeholder="Add substep…" onkeydown="if(event.key==='Enter')addSub(${s.id})"/>
      <button class="add-go" onclick="addSub(${s.id})">Add</button>
    </div>
    <div class="sec-div" style="margin-top:10px"><div class="sec-div-line"></div><div class="sec-div-lbl">Notes</div><div class="sec-div-line"></div></div>
    <textarea class="script-field" placeholder="Notes, script blocks, reminders…" oninput="setScript(${s.id},this.value)">${esc(s.script||"")}</textarea>
    <div class="step-ft">
      <button class="mv-btn" onclick="moveStep(${s.id},-1)" ${i===0?"disabled":""}>↑</button>
      <button class="mv-btn" onclick="moveStep(${s.id},1)" ${i===total-1?"disabled":""}>↓</button>
      <button class="del-btn" onclick="delStep(${s.id})">🗑 Delete</button>
    </div>
  </div></div>`;
}

function renderSub(stepId,sub){
  const kids=sub.kids||[];
  return`<div>
    <div class="sub-row">
      <input type="checkbox" class="chk" ${sub.done?"checked":""} onchange="toggleSub(${stepId},${sub.id})"/>
      <div class="sub-txt-wrap"><div class="sub-txt ${sub.done?"done":""}" contenteditable="true" data-subid="${sub.id}" onblur="editSub(${stepId},${sub.id},this.innerText)">${esc(sub.t)}</div></div>
      <button class="sub-del" onclick="delSub(${stepId},${sub.id})">✕</button>
    </div>
    ${kids.length?`<div class="kids-wrap">${kids.map(k=>`<div class="sub-row"><input type="checkbox" class="chk" ${k.done?"checked":""} onchange="toggleKid(${stepId},${sub.id},${k.id})"/><div class="sub-txt-wrap"><div class="sub-txt ${k.done?"done":""}" contenteditable="true" onblur="editKid(${stepId},${sub.id},${k.id},this.innerText)">${esc(k.t)}</div></div><button class="sub-del" onclick="delKid(${stepId},${sub.id},${k.id})">✕</button></div>`).join("")}</div>`:""}
    <div class="kid-add-row" id="karow-${sub.id}" style="display:none">
      <input class="kid-add-input" id="ka-${sub.id}" placeholder="Add substep…" onkeydown="if(event.key==='Enter')addKid(${stepId},${sub.id})"/>
      <button class="mini-btn" onclick="addKid(${stepId},${sub.id})">Add</button>
    </div>
    <button class="mini-btn" style="margin-left:23px;margin-top:1px" onclick="showKidRow(${sub.id})">＋ substep</button>
  </div>`;
}

function emptyFull(ico,title,body,action,btn){
  const b=action?`<button class="empty-btn" onclick="${action}">${btn}</button>`:"";
  return`<div class="canvas"><div class="empty-wrap"><div class="empty-ico">${ico}</div><h3>${title}</h3><p>${body}</p>${b}</div></div>`;
}

/* ACTIONS */
function firstEpId(sn){
  if(!sn)return null;
  if(isTTProject()) return sn.cycles?.[0]?.id||null;
  return sn.episodes?.[0]?.id||null;
}
function pickProj(id){S.activeProject=id;const p=P();S.activeSeason=p.seasons[0]?.id||null;const sn=season();S.activeEp=firstEpId(sn);const e=ep();S.activeWf=e?.workflows[0]?.id||null;S.openStep=null;render();}
function pickSeason(id){S.activeSeason=id;const sn=season();S.activeEp=firstEpId(sn);const e=ep();S.activeWf=e?.workflows[0]?.id||null;S.openStep=null;render();}
function pickEp(id){S.activeEp=id;const e=ep();S.activeWf=e?.workflows[0]?.id||null;S.openStep=null;render();}
function pickWf(id){S.activeWf=id;S.openStep=null;render();}
function toggleStep(id){S.openStep=S.openStep===id?null:id;render();}
function toggleGroup(key){if(!S.collapsedGroups)S.collapsedGroups={};S.collapsedGroups[key]=!S.collapsedGroups[key];render();}

function cycleStep(stepId){
  const w=wf();if(!w)return;
  const s=w.steps.find(s=>s.id===stepId);if(!s)return;
  // toggle: if finished → not-started, else → finished
  s.status = s.status==="finished" ? "not-started" : "finished";
  // if marking done, also check all substeps
  if(s.status==="finished"){
    (s.subs||[]).forEach(sub=>{sub.done=true;(sub.kids||[]).forEach(k=>k.done=true);});
  } else {
    // uncheck all substeps when unmarking
    (s.subs||[]).forEach(sub=>{sub.done=false;(sub.kids||[]).forEach(k=>k.done=false);});
  }
  save();render();
}

function autoStatus(s){
  // automatically set step status based on substep completion
  if(!s.subs||s.subs.length===0)return;
  let total=0,done=0;
  s.subs.forEach(x=>{total++;if(x.done)done++;(x.kids||[]).forEach(k=>{total++;if(k.done)done++;});});
  if(done===0)s.status="not-started";
  else if(done===total)s.status="finished";
  else if(done/total>=0.5)s.status="editing";
  else s.status="filming";
}

function updateHeaderStrip(){
  // update the 4 major pill counts in the header without full re-render
  const w=wf();if(!w)return;
  const all=w.steps;
  const counts={"not-started":0,filming:0,editing:0,finished:0};
  all.forEach(s=>{if(counts[s.status]!==undefined)counts[s.status]++;});
  ["not-started","filming","editing","finished"].forEach(k=>{
    const el=document.querySelector(`.mp-${k} .major-pill-ct`);
    if(el)el.textContent=counts[k];
    const bar=document.querySelector(`.mp-${k} .major-pill-fill`);
    if(bar)bar.style.width=(all.length?Math.round(counts[k]/all.length*100):0)+"%";
  });
  // update episode % and remaining
  const done=counts.finished;
  const epEl=document.querySelector('.stat-card .stat-v[style*="color"]');
  if(epEl){const epPct=all.length?Math.round(done/all.length*100):0;epEl.textContent=epPct+"%";}
}

function updateStepRing(stepId){
  const w=wf();if(!w)return;
  const s=w.steps.find(s=>s.id===stepId);if(!s)return;
  const pct=stepRingPct(s);
  const col=s.ver?verColor(s.ver):stageColor(s.status);
  const sz=26,sw=2.5,r=(sz-sw)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  // find the ring svg for this step and update it
  document.querySelectorAll('.step').forEach(el=>{
    const hd=el.querySelector('.step-hd');
    if(!hd)return;
    // match by checking if toggleStep call matches stepId
    const onclick=hd.getAttribute('onclick')||'';
    if(onclick.includes('toggleStep('+stepId+')')){
      const svg=el.querySelector('.step-ring svg circle:last-child');
      if(svg){svg.setAttribute('stroke',col);svg.setAttribute('stroke-dashoffset',off);}
      const meta=el.querySelector('.step-meta span');
      if(meta&&meta.textContent.includes('/')){
        const ss=subStats(s);
        meta.textContent='☑ '+ss.done+'/'+ss.total;
      }
    }
  });
}

function setDesc(id,v){const w=wf();if(!w)return;const s=w.steps.find(s=>s.id===id);if(s)s.desc=v;save();}
function setScript(id,v){const w=wf();if(!w)return;const s=w.steps.find(s=>s.id===id);if(s)s.script=v;save();}
function setStatus(id,k){const w=wf();if(!w)return;const s=w.steps.find(s=>s.id===id);if(s)s.status=k;render();}
function addStep(){const inp=document.getElementById("newStepInput");if(!inp||!inp.value.trim())return;const w=wf();if(!w)return;w.steps.push({id:nid(),title:inp.value.trim(),ver:"",desc:"",status:"not-started",substage:"",subs:[],script:""});render();}
function delStep(id){const w=wf();if(!w)return;w.steps=w.steps.filter(s=>s.id!==id);if(S.openStep===id)S.openStep=null;render();}
function moveStep(id,dir){const w=wf();if(!w)return;const i=w.steps.findIndex(s=>s.id===id),j=i+dir;if(j<0||j>=w.steps.length)return;[w.steps[i],w.steps[j]]=[w.steps[j],w.steps[i]];render();}
function addSub(stepId){const inp=document.getElementById("sub-"+stepId);if(!inp||!inp.value.trim())return;const s=wf()?.steps.find(s=>s.id===stepId);if(!s)return;if(!s.subs)s.subs=[];s.subs.push({id:nid(),t:inp.value.trim(),done:false,kids:[]});render();}
function toggleSub(stepId,subId){
  const w=wf();if(!w)return;
  const s=w.steps.find(s=>s.id===stepId);const x=s?.subs.find(u=>u.id===subId);if(!x)return;
  x.done=!x.done;
  autoStatus(s);
  save();
  document.querySelectorAll('.sub-txt').forEach(el=>{if(el.dataset.subid==subId)el.classList.toggle('done',x.done);});
  updateStepRing(stepId);
  updateHeaderStrip();
}
function editSub(stepId,subId,v){const s=wf()?.steps.find(s=>s.id===stepId);const x=s?.subs.find(u=>u.id===subId);if(x)x.t=v.trim()||x.t;save();}
function delSub(stepId,subId){const s=wf()?.steps.find(s=>s.id===stepId);if(s)s.subs=s.subs.filter(u=>u.id!==subId);render();}
function showKidRow(subId){const r=document.getElementById("karow-"+subId);if(r){r.style.display="flex";document.getElementById("ka-"+subId)?.focus();}}
function addKid(stepId,subId){const inp=document.getElementById("ka-"+subId);if(!inp||!inp.value.trim())return;const s=wf()?.steps.find(s=>s.id===stepId);const x=s?.subs.find(u=>u.id===subId);if(!x)return;if(!x.kids)x.kids=[];x.kids.push({id:nid(),t:inp.value.trim(),done:false});render();}
function toggleKid(stepId,subId,kidId){
  const w=wf();if(!w)return;
  const s=w.steps.find(s=>s.id===stepId);
  const x=s?.subs.find(u=>u.id===subId);const k=x?.kids.find(k=>k.id===kidId);if(!k)return;
  k.done=!k.done;
  autoStatus(s);
  save();
  updateStepRing(stepId);
  updateHeaderStrip();
}
function editKid(stepId,subId,kidId,v){const x=wf()?.steps.find(s=>s.id===stepId)?.subs.find(u=>u.id===subId);const k=x?.kids.find(k=>k.id===kidId);if(k)k.t=v.trim()||k.t;save();}
function delKid(stepId,subId,kidId){const x=wf()?.steps.find(s=>s.id===stepId)?.subs.find(u=>u.id===subId);if(x)x.kids=x.kids.filter(k=>k.id!==kidId);render();}

/* MODALS */
function openModal(type){S.modal=type;S.modalDraft={name:"",color:COLORS[0],label:""};renderModal();}
function closeModal(){S.modal=null;document.getElementById("modalRoot").innerHTML="";}
function renderModal(){
  const root=document.getElementById("modalRoot");if(!S.modal){root.innerHTML="";return;}
  const cfg={
    proj:{title:"New series",hint:"Add a content series.",ph:"Series name",colorPicker:true,key:"name"},
    season:{title:"New season",hint:'e.g. "Season 4 (Year 7)"',ph:"Season label",colorPicker:false,key:"label"},
    ep:{title:isTTProject()?"New cycle":"New episode",hint:isTTProject()?"3 subject names separated by commas — e.g. John, Maria, Dre":"Episode title.",ph:isTTProject()?"Subject 1, Subject 2, Subject 3":"Episode title",colorPicker:false,key:"name"},
    wf:{title:"New workflow",hint:"e.g. Filming, Editing, Publishing",ph:"Workflow name",colorPicker:false,key:"name"},
  };
  const c=cfg[S.modal];
  const sw=c.colorPicker?`<div class="field-lbl">Color</div><div class="swatches">${COLORS.map(col=>`<div class="swatch ${S.modalDraft.color===col?"sel":""}" style="background:${col}" onclick="S.modalDraft.color='${col}';renderModal()"></div>`).join("")}</div>`:"";
  root.innerHTML=`<div class="veil" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>${c.title}</h2><div class="modal-hint">${c.hint}</div>
    <input type="text" id="md-name" placeholder="${c.ph}" oninput="S.modalDraft.${c.key}=this.value" onkeydown="if(event.key==='Enter')confirmModal()"/>
    ${sw}
    <div class="modal-acts"><button class="m-cancel" onclick="closeModal()">Cancel</button><button class="m-ok" onclick="confirmModal()">Add</button></div>
  </div></div>`;
  setTimeout(()=>document.getElementById("md-name")?.focus(),30);
}
function confirmModal(){
  const d=S.modalDraft,p=P();
  if(S.modal==="proj"){
    if(!d.name?.trim())return;
    const np={id:nid(),name:d.name.trim(),color:d.color,seriesType:"generic",desc:"",seasons:[mkSeason("Season 1",[],"generic")]};
    S.projects.push(np);S.activeProject=np.id;S.activeSeason=np.seasons[0].id;S.activeEp=null;S.activeWf=null;
  }else if(S.modal==="season"){
    if(!p||!d.label?.trim())return;
    const sType=p.seriesType||"generic";const ns=mkSeasonWithCycles(d.label.trim(),[],sType);p.seasons.push(ns);S.activeSeason=ns.id;
    const fc=ns.cycles?.[0];S.activeEp=fc?.id||null;S.activeWf=fc?.workflows?.[0]?.id||null;
  }else if(S.modal==="ep"){
    const sn=season();if(!sn||!d.name?.trim())return;
    if(isTTProject()){
      const existing=sn.cycles||[];const num=existing.length+1;
      const parts=d.name.trim().split(",").map(x=>x.trim());
      const s1=parts[0]||`Ep ${(num-1)*3+1}`;
      const s2=parts[1]||`Ep ${(num-1)*3+2}`;
      const s3=parts[2]||`Ep ${(num-1)*3+3}`;
      const nc=mkCycle(num,s1,s2,s3);
      if(!sn.cycles)sn.cycles=[];
      sn.cycles.push(nc);S.activeEp=nc.id;S.activeWf=nc.workflows[0]?.id||null;
    } else {
      const sType=p?.seriesType||"generic";const ne=mkEp(d.name.trim(),sType);
      if(!sn.episodes)sn.episodes=[];
      sn.episodes.push(ne);S.activeEp=ne.id;S.activeWf=ne.workflows[0]?.id||null;
    }
  }else if(S.modal==="wf"){
    const e=ep();if(!e||!d.name?.trim())return;
    const nw={id:nid(),name:d.name.trim(),steps:[],isCycle:false};e.workflows.push(nw);S.activeWf=nw.id;
  }
  S.modal=null;S.openStep=null;document.getElementById("modalRoot").innerHTML="";render();
}

function toast(msg){const el=document.createElement("div");el.className="toast";el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// Show loading state while fetching from Supabase
const spinStyle=document.createElement("style");
spinStyle.textContent="@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(spinStyle);

loadAndRender();
window.addEventListener('beforeunload',()=>saveNow());
window.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')saveNow();});
</script>
